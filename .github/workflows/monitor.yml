name: threads-monitor

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests playwright
      - run: python -m playwright install --with-deps chromium
      - name: Run monitor
        run: python monitor.py
      - name: Save state
        run: |
          if [ -n "$(git status --porcelain last_seen.json)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add last_seen.json
            git commit -m "update last_seen"
            git push
          else
            echo "no state change"
          fi
